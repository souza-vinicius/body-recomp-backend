version: '3.8'

services:
  # PostgreSQL Database (Dev)
  db:
    image: postgres:15-alpine
    container_name: body-recomp-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-body_recomp}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal-dev

  # FastAPI Backend (Dev)
  api:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: body-recomp-api-dev
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-body_recomp}
      DEBUG: "true"
      ALLOWED_ORIGINS: "http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal-dev

  # Next.js Frontend (Dev)
  web:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: deps
    container_name: body-recomp-web-dev
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_IS_CAPACITOR: "false"
    depends_on:
      api:
        condition: service_started
    networks:
      - internal-dev

volumes:
  postgres_data_dev:
    driver: local

networks:
  internal-dev:
    driver: bridge
